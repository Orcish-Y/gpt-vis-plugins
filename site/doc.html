<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPT-Vis Markdown Plugins - Documentation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fafafa;
        color: #333;
        line-height: 1.7;
      }
      header {
        padding: 12px 24px;
        background: #1a1a2e;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 24px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      header a {
        color: #aab;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.2s;
      }
      header a:hover {
        color: #fff;
      }
      #layout {
        display: flex;
        max-width: 1200px;
        margin: 0 auto;
        min-height: calc(100vh - 44px);
      }
      #sidebar {
        width: 240px;
        flex-shrink: 0;
        padding: 24px 16px;
        border-right: 1px solid #e8e8e8;
        position: sticky;
        top: 44px;
        align-self: flex-start;
        max-height: calc(100vh - 44px);
        overflow-y: auto;
      }
      #sidebar nav {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      #sidebar .nav-section {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #999;
        margin-top: 20px;
        margin-bottom: 4px;
      }
      #sidebar .nav-section:first-child {
        margin-top: 0;
      }
      #sidebar a {
        display: block;
        padding: 6px 12px;
        color: #555;
        text-decoration: none;
        font-size: 13px;
        border-radius: 6px;
        transition: all 0.15s;
      }
      #sidebar a:hover {
        background: #eee;
        color: #1a1a2e;
      }
      #sidebar a.active {
        background: #1a1a2e;
        color: #fff;
      }
      #content {
        flex: 1;
        padding: 32px 48px;
        max-width: 800px;
      }
      #content h1 {
        font-size: 28px;
        margin-bottom: 8px;
        color: #1a1a2e;
      }
      #content h2 {
        font-size: 20px;
        margin-top: 40px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #e8e8e8;
        color: #1a1a2e;
      }
      #content h3 {
        font-size: 16px;
        margin-top: 28px;
        margin-bottom: 8px;
        color: #333;
      }
      #content p {
        margin: 12px 0;
      }
      #content ul,
      #content ol {
        padding-left: 24px;
        margin: 8px 0;
      }
      #content li {
        margin: 4px 0;
      }
      #content a {
        color: #1a1a2e;
      }
      #content code {
        background: #f0f0f0;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 0.88em;
        font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      }
      #content pre {
        background: #1e1e2e;
        color: #cdd6f4;
        padding: 16px 20px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 16px 0;
        font-size: 13px;
        line-height: 1.6;
      }
      #content pre code {
        background: none;
        padding: 0;
        color: inherit;
        font-size: inherit;
      }
      #content table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0;
      }
      #content th,
      #content td {
        text-align: left;
        padding: 10px 14px;
        border: 1px solid #e8e8e8;
        font-size: 13px;
      }
      #content th {
        background: #f5f5f5;
        font-weight: 600;
      }
      #content .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        margin-left: 6px;
        vertical-align: middle;
      }
      .tag-required {
        background: #fff0f0;
        color: #c41a1a;
      }
      .tag-optional {
        background: #f0f0f0;
        color: #666;
      }
    </style>
  </head>
  <body>
    <header>
      GPT-Vis Markdown Plugins
      <a href="/">Demo</a>
      <a href="/doc.html">Docs</a>
    </header>
    <div id="layout">
      <aside id="sidebar">
        <nav>
          <div class="nav-section">Overview</div>
          <a href="#installation">Installation</a>
          <a href="#quick-start">Quick Start</a>

          <div class="nav-section">Ecosystem Usage</div>
          <a href="#ecosystem-unified">Unified / rehype</a>
          <a href="#ecosystem-markdown-it">markdown-it</a>
          <a href="#ecosystem-marked">marked</a>

          <div class="nav-section">API Reference</div>
          <a href="#api-register">registerGPTVisElement</a>
          <a href="#api-isvis">isVisSyntax</a>
          <a href="#api-defaults">GPTVisDefaultOptions</a>
          <a href="#api-rehype">rehypeGPTVis</a>
          <a href="#api-markdown-it">gptVisMarkdownItPlugin</a>
          <a href="#api-marked">markedGPTVis</a>
        </nav>
      </aside>
      <main id="content"></main>
    </div>
    <script type="module" src="/src/doc.ts"></script>
  </body>
</html>
